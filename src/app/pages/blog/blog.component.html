<div
  class="flex-1 flex h-screen w-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300"
>
  <!-- Mobile: Top post picker -->
  <div
    class="md:hidden w-full border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3"
  >
    <select
      class="w-full rounded-lg px-3 py-2 text-sm bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-[#46C47C]"
      (change)="selectPost(posts[$any($event.target).selectedIndex])"
    >
      <option *ngFor="let post of posts" [value]="post.id">{{ post.title }}</option>
    </select>
  </div>

  <!-- Sidebar -->
  <aside
    class="hidden md:flex flex-col w-72 shrink-0 border-r border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 gap-4 transition-colors duration-300 overflow-y-auto"
  >
    <h2 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100">
      📚 All Blogs
    </h2>

    <ul class="space-y-1 flex-1">
      <li
        *ngFor="let post of posts"
        class="cursor-pointer px-3 py-3 rounded-xl transition-all duration-200 border"
        [ngClass]="
          selectedPost?.id === post.id
            ? 'bg-[#46C47C]/10 dark:bg-[#46C47C]/20 border-[#46C47C]/30 dark:border-[#46C47C]/40'
            : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-700'
        "
        (click)="selectPost(post)"
        (keydown.enter)="selectPost(post)"
        (keydown.space)="selectPost(post)"
        tabindex="0"
      >
        <p
          class="font-medium text-sm leading-snug"
          [ngClass]="
            selectedPost?.id === post.id
              ? 'text-[#2E9E5E] dark:text-[#5DD68E]'
              : 'text-slate-800 dark:text-slate-200'
          "
        >
          {{ post.title }}
        </p>
        <p class="text-xs mt-1 text-slate-400 dark:text-slate-500">
          {{ post.created_at ? (post.created_at | timeAgo) : '' }}
        </p>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 px-6 md:px-12 py-10 max-w-4xl mx-auto w-full">
    <ng-container *ngIf="selectedPost; else noPost">
      <!-- Post Header -->
      <div class="mb-8 pb-6 border-b border-slate-200 dark:border-slate-700">
        <h1
          class="text-3xl sm:text-4xl font-extrabold leading-tight tracking-tight text-slate-900 dark:text-slate-100 mb-3"
        >
          {{ selectedPost.title }}
        </h1>
        <h2 class="text-lg font-medium text-slate-500 dark:text-slate-400">
          {{ selectedPost.description }}
        </h2>
      </div>

      <!-- Post Body -->
      <div
        class="prose prose-lg max-w-none prose-headings:text-slate-900 dark:prose-headings:text-slate-100 prose-p:text-slate-600 dark:prose-p:text-slate-300 prose-a:text-[#46C47C] prose-a:no-underline hover:prose-a:underline prose-strong:text-slate-900 dark:prose-strong:text-slate-100 prose-code:text-[#b7410e] dark:prose-code:text-[#fb923c] prose-code:bg-slate-100 dark:prose-code:bg-slate-800 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-pre:bg-slate-900 dark:prose-pre:bg-slate-950 prose-pre:border prose-pre:border-slate-700 prose-blockquote:border-l-[#46C47C] prose-blockquote:text-slate-500 dark:prose-blockquote:text-slate-400 prose-li:text-slate-600 dark:prose-li:text-slate-300 transition-colors duration-300"
        [innerHTML]="sanitizedContent"
      ></div>
      <!-- <markdown
        class="prose prose-lg max-w-none prose-headings:text-slate-900 dark:prose-headings:text-slate-100 prose-p:text-slate-600 dark:prose-p:text-slate-300 prose-a:text-[#46C47C] prose-a:no-underline hover:prose-a:underline prose-strong:text-slate-900 dark:prose-strong:text-slate-100 prose-code:text-[#b7410e] dark:prose-code:text-[#fb923c] prose-code:bg-slate-100 dark:prose-code:bg-slate-800 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-pre:bg-slate-900 dark:prose-pre:bg-slate-950 prose-pre:border prose-pre:border-slate-700 prose-blockquote:border-l-[#46C47C] prose-blockquote:text-slate-500 dark:prose-blockquote:text-slate-400 prose-li:text-slate-600 dark:prose-li:text-slate-300 transition-colors duration-300"
        [data]="selectedPost.content"
        prism
      ></markdown> -->
    </ng-container>

    <ng-template #noPost>
      <div class="flex flex-col items-center justify-center h-full min-h-[50vh] gap-3">
        <span class="text-5xl">📝</span>
        <p class="text-slate-400 dark:text-slate-500 text-lg">
          Select a blog post from the sidebar to start reading.
        </p>
      </div>
    </ng-template>
  </main>
</div>
