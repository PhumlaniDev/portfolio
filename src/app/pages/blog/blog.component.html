<div
  class="flex-1 flex h-screen w-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300"
>
  <!-- Mobile: Top post picker -->
  <div
    class="md:hidden w-full border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3"
  >
    <select
      class="w-full rounded-lg px-3 py-2 text-sm bg-slate-100 dark:bg-slate-700 ..."
      (change)="router.navigate(['/blog', posts[$any($event.target).selectedIndex].slug])"
    ></select>
  </div>

  <!-- Sidebar -->
  <aside
    class="hidden md:flex flex-col w-72 shrink-0 border-r border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 gap-4 transition-colors duration-300 overflow-y-auto"
  >
    <h2 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100">
      📚 All Blogs
    </h2>

    <ul class="space-y-1 flex-1">
      <li
        *ngFor="let post of posts"
        class="cursor-pointer px-3 py-3 rounded-xl transition-all duration-200 border border-transparent hover:bg-slate-100 dark:hover:bg-slate-700"
        [routerLink]="['/blog', post.slug]"
        tabindex="0"
        (keydown.enter)="router.navigate(['/blog', post.slug])"
        (keydown.space)="router.navigate(['/blog', post.slug])"
      >
        <p class="font-medium text-sm leading-snug text-slate-800 dark:text-slate-200">
          {{ post.title }}
        </p>
        <p class="text-xs mt-1 text-slate-400 dark:text-slate-500">
          {{ post.created_at ? (post.created_at | timeAgo) : '' }}
        </p>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <!-- Main Content -->
  <main class="flex-1 px-6 md:px-12 py-10 max-w-4xl mx-auto w-full">
    <div class="flex flex-col items-center justify-center h-full min-h-[50vh] gap-3">
      <span class="text-5xl">📝</span>
      <p class="text-slate-400 dark:text-slate-500 text-lg">
        Select a blog post from the sidebar to start reading.
      </p>
    </div>
  </main>
</div>
