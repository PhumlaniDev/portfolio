<div class="min-h-screen bg-[#0f0f0f] text-[#e8e6e1]">
  <!-- Header bar -->
  <div
    class="sticky top-0 z-40 flex items-center justify-between border-b border-white/10 bg-[#0f0f0f]/95 px-6 py-3 backdrop-blur-sm"
  >
    <a
      routerLink="/blog/admin"
      class="flex items-center gap-2 text-sm text-[#a0998f] hover:text-[#e8e6e1]"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Dashboard
    </a>

    <div class="flex items-center gap-3">
      @if (isSaving()) {
        <span class="text-xs text-[#6b6460]">Saving...</span>
      }
      <button
        (click)="saveDraft()"
        [disabled]="isSaving()"
        class="rounded-lg border border-white/10 px-4 py-1.5 text-sm text-[#a0998f] transition-colors hover:border-white/20 hover:text-[#e8e6e1] disabled:opacity-40"
      >
        Save draft
      </button>
      <button
        (click)="publish()"
        [disabled]="isSaving() || form.invalid"
        class="rounded-lg bg-[#c9b99a] px-4 py-1.5 text-sm font-medium text-[#0f0f0f] transition-opacity hover:opacity-90 disabled:opacity-40"
      >
        {{ isEditMode() ? 'Update' : 'Publish' }}
      </button>
    </div>
  </div>

  <div class="mx-auto max-w-4xl px-6 py-10">
    @if (errorMessage()) {
      <div
        class="mb-6 rounded-lg border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-400"
      >
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" class="space-y-6">
      <!-- Title -->
      <div>
        <input
          formControlName="title"
          type="text"
          placeholder="Post title..."
          (input)="onTitleChange()"
          class="w-full border-0 bg-transparent font-serif text-4xl font-bold text-[#e8e6e1] placeholder-[#3a3530] outline-none"
        />
      </div>

      <!-- Slug preview -->
      <div class="flex items-center gap-2 text-xs text-[#6b6460]">
        <span>URL:</span>
        <span class="font-mono text-[#a0998f]">/blog/{{ slugPreview() }}</span>
      </div>

      <!-- Excerpt -->
      <div>
        <textarea
          formControlName="excerpt"
          placeholder="Short excerpt for listing pages..."
          rows="2"
          class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-[#ccc8c2] placeholder-[#4a4540] outline-none transition-colors focus:border-white/20"
        >
        </textarea>
      </div>

      <!-- Tags -->
      <div>
        <input
          formControlName="tagsInput"
          type="text"
          placeholder="Tags (comma separated): java, spring-boot, devops"
          class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-[#ccc8c2] placeholder-[#4a4540] outline-none transition-colors focus:border-white/20"
        />
      </div>

      <!-- Cover image URL -->
      <!-- Cover image URL with upload -->
      <div class="space-y-2">
        <div class="flex gap-2">
          <input
            formControlName="coverImageUrl"
            type="url"
            placeholder="Cover image URL (optional)"
            class="flex-1 rounded-lg border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-[#ccc8c2] placeholder-[#4a4540] outline-none transition-colors focus:border-white/20"
          />

          <label
            class="flex items-center gap-2 cursor-pointer rounded-lg border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-[#a0998f] transition-colors hover:border-white/20 hover:text-[#e8e6e1] whitespace-nowrap"
          >
            @if (isUploadingCover()) {
              <span>Uploading...</span>
            } @else {
              <span>Upload</span>
            }
            <input
              type="file"
              accept="image/*"
              class="hidden"
              [disabled]="isUploadingCover()"
              (change)="onCoverImageSelected($event)"
            />
          </label>
        </div>

        @if (form.get('coverImageUrl')?.value) {
          <img
            [src]="form.get('coverImageUrl')?.value"
            alt="Cover preview"
            class="h-32 w-full rounded-lg object-cover"
          />
        }
      </div>

      <!-- TinyMCE Editor -->
      <div class="rounded-xl border border-white/10 overflow-hidden">
        <editor formControlName="content" [init]="tinymceConfig" apiKey="YOUR_TINYMCE_API_KEY">
        </editor>
      </div>
    </form>
  </div>
</div>
