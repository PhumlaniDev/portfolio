name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
      - nav-bar
  pull_request:
    branches:
      - main

jobs:
  install-and-build:
    name: Install Dependencies & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create environment file
        run: |
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
              measurementId: '${{ secrets.FIREBASE_MEASUREMENT_ID }}'
            }
          };
          EOF

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier Fix
        run: npx prettier --write "src/**/*.ts"

      - name: Run Prettier Check
        run: npx prettier --check "src/**/*.ts"

      - name: Build Project
        run: npm run build -- --configuration=production

      - name: Upload build artifact # ← share dist/ with docker job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/portfolio/

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: install-and-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create environment file # ← needed here too
        run: |
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
              measurementId: '${{ secrets.FIREBASE_MEASUREMENT_ID }}'
            }
          };
          EOF

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [install-and-build, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download build artifact # ← use the built dist/
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phumlani_arendse-portfolio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phumlani_arendse-portfolio:${{ github.run_number }}
