name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - nav-bar
  pull_request:
    branches:
      - main

jobs:
  install-and-build:
    name: Install Dependencies & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Create environment file
        run: node generate-env.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier Fix
        run: npx prettier --write "src/**/*.ts"

      - name: Run Prettier Check
        run: npx prettier --check "src/**/*.ts"

      - name: Build Project
        run: npm run build -- --configuration=production

      - name: Upload build artifact # ← share dist/ with docker job
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: dist/portfolio/

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: install-and-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Create environment file
        run: node generate-env.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [install-and-build, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download build artifact # ← use the built dist/
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/portfolio/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v7.0.0

        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phumlani_arendse-portfolio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phumlani_arendse-portfolio:${{ github.run_number }}
